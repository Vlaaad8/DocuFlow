<mat-sidenav-container>
  <mat-sidenav mode="side" opened class="sidenav-design">
    <app-sidenav-user [selectedRequestsTab]="true"></app-sidenav-user>


  </mat-sidenav>

  <mat-sidenav-content>
    <app-pdf-viewer *ngIf="documentURL!= ''" [pdfUrl]="documentURL" (closeViewer)="handleViewerClose()"></app-pdf-viewer>
    <div class="description-section">
      <div class="first-row">
        <h2>Requests Manager</h2>
        <app-exit-button></app-exit-button>
      </div>
      <p>Manage and review your document requests here.</p>
    </div>
    <div class="container">
      <mat-tab-group class="tab-section">
        <mat-tab label="Pending Requests" *ngIf="user.role!='Employee'">
          <div class="tab-content">
            <app-document-approval [loading]="loading" *ngFor="let approval of approvals" [approval]="approval"
              (approvalAction)="handleDecision($event)" (previewDocument)="handlePreview($event)"></app-document-approval>
          </div>
          <div *ngIf="approvals.length == 0" class="no-requests">
            <p>No pending requests available.</p>
          </div>
        </mat-tab>
        <mat-tab label="My Requests">
          <div class="tab-section">
            <div class="filter-section">
              <button [ngClass]="currentFilter == null ? 'selected' : ''" (click)="handleFilter(null)">All</button>
              <button [ngClass]="currentFilter == 'ACCEPTED' ? 'selected' : ''" (click)="handleFilter('ACCEPTED')">Accepted</button>
              <button [ngClass]="currentFilter == 'PENDING' ? 'selected' : ''" (click)="handleFilter('PENDING')">Pending</button>
              <button [ngClass]="currentFilter == 'REJECTED' ? 'selected' : ''" (click)="handleFilter('REJECTED')">Rejected</button>
            </div>
            <div class=requests-list>
              <app-my-request *ngFor="let request of requestsToDisplay" [request]="request"></app-my-request>
            </div>
          </div>
        </mat-tab>

      </mat-tab-group>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
