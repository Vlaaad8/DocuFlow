<mat-sidenav-container>
  <mat-sidenav mode="side" opened class="sidenav-design">
    <app-sidenav-user [selectedRequestsTab]="true"></app-sidenav-user>


  </mat-sidenav>

  <mat-sidenav-content>
    <div class="description-section">
      <div class="first-row">
        <h2>Requests Manager</h2>
        <app-exit-button></app-exit-button>
      </div>
      <p>Manage and review your document requests here.</p>
    </div>
    <div class="container">
      <mat-tab-group class="tab-section">
        <mat-tab label="Pending Requests" *ngIf="user.role!='Employee'">
          <p>Here you can view and manage your pending document requests.</p>
          <div class="tab-content">
            <app-document-approval *ngFor="let approval of approvals" [approval]="approval"
              (approvalAction)="handleDecision($event)"></app-document-approval>
          </div>
          <div *ngIf="approvals.length == 0" class="no-requests">
            <p>No pending requests available.</p>
          </div>
        </mat-tab>
        <mat-tab label="My Requests">
          <div class="tab-section">
            <p>Here you can view your approved document requests.</p>
            <div class=requests-list>
              <app-my-request *ngFor="let request of requests" [request]="request"></app-my-request>
            </div>
          </div>
        </mat-tab>

      </mat-tab-group>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
