<div class="main-container">
  <div class="logo-part">
    <img src="DocuFlow-White.png" alt="DocuFlow" class="loginLogo">
  </div>
  <div class="functional-part">
    <div class="login-container">
      <div class="info-section">
        <div class="header-section">
          <h3>Sign in</h3>
          <mat-spinner diameter="30" strokeWidth="4" class="custom-spinner" *ngIf="loading"></mat-spinner>
        </div>
        <p>Sign in into your account to proceed</p>
         <div class="error-section" *ngIf="errorMessage">
        <mat-icon>error</mat-icon>
        <div class="action-zone">
          <p>{{errorMessage}}</p>
          <mat-icon (click)="errorMessage = null">close</mat-icon>
        </div>
      </div>
      </div>
     
      <form [formGroup]="formGroup" (ngSubmit)="onSignUp()">
        <div class="input-design">
          <label>Username or Email</label>
          <div class="input-wrapper">
            <input type="text" placeholder="name@docuflow.ro" formControlName="username">
            <div class="icon-design">
              <mat-icon>email</mat-icon>
            </div>
          </div>
        </div>
        <div class="input-design">
          <label>Password</label>
          <div class="input-wrapper">
            <input type="password" formControlName="password">
            <div class="icon-design">
              <mat-icon>lock</mat-icon>
            </div>
          </div>
        </div>

        <button class="logButton">Sign in</button>
        <p>Don't have an account? <span id="signUp">Make a request</span></p>
      </form>
    </div>

  </div>
</div>
