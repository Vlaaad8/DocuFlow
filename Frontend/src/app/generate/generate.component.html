<mat-sidenav-container>
  <mat-sidenav mode="side" opened class="sidenav-design">
    <app-sidenav-user [selectedGenerateTab]="true"></app-sidenav-user>


  </mat-sidenav>

  <mat-sidenav-content>
    <div class="description-section">
      <div class="first-row">
        <h2>Generate Document</h2>
        <app-exit-button></app-exit-button>
      </div>
      <p>Autofill and sign your document with ease using our generation tools.</p>
      <div class="main-content">
        <div class="first-part">
          aaa
        </div>
        <div class="second-part">
          <app-template-selector [schema]="template" (event)="handleGenerateEvent($event)"
            *ngFor="let template of templates"></app-template-selector>
        </div>
      </div>
    </div>

    <div class="confirm-zone" *ngIf="isModalOpen">
      <div class="card">
        <div class="card-header">
          <h3>Template Details</h3>
          <mat-icon (click)="isModalOpen = false">close</mat-icon>
        </div>
        <div class="card-body">
          <h3>Document preview</h3>
          <div class="detail-card">
            <p>Document will be generated with you following personal data</p>
            <div>
              <p class="field-item" *ngFor="let field of templateFields"><span class="field-label">{{field.name}}:
                </span> <span>{{field.value}}</span></p>
            </div>
          </div>
          <div class="buttonSection">
            <button type="submit" (click)="generateDocument()">Generate Document</button>
            <button type="button" (click)="handleLeave()">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
