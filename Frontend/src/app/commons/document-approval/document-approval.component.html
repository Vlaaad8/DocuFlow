<div class="container">
  <div class="first-row">
      <div class="info-section">
        <div>
          <mat-icon class="icon-title">
            file_open
          </mat-icon>
        </div>
        <div class="text-section">
          <h3>{{approval.templateName}}</h3>
          <p>{{approval.requesterName}}</p>
        </div>
      </div>
      <div class="Pending">
        {{formatStatus(approval.status)}}
      </div>
  </div>
  <div class="time-info">
    <p>Generated: <span>{{formatDate(approval.decisionDate)}}</span></p>
  </div>
  <div class="content">
    <button class="approve" (click)="approve()"><mat-icon>thumb_up</mat-icon>Approve</button>
    <button class="reject" (click)="reject()"><mat-icon>thumb_down</mat-icon>Reject</button>
    <button class="preview" (click)="preview()"><mat-icon>visibility</mat-icon>Preview</button>
  </div>
</div>
