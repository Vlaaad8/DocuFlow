<div class="card" [ngClass]=" loading ? 'action-disabled' : '' ">
  <!-- Top accent bar -->
  <mat-progress-bar *ngIf ="internalLock" class="custom-loading-bar" mode="indeterminate"></mat-progress-bar>
  <!-- Header -->
  <div class="card-header">
    <div class="card-left">
      <div class="card-icon" [ngClass]="'icon--' + approval.status.toLowerCase()">
        <mat-icon>description</mat-icon>
      </div>
      <div class="card-title">
        <h3>{{ approval.templateName }}</h3>
        <span class="requester-chip">
          <mat-icon class="chip-icon">person</mat-icon>
          {{ approval.requesterName }}
        </span>
      </div>
    </div>
    <span class="status-badge" [ngClass]="'badge--' + approval.status.toLowerCase()">
      {{ formatStatus(approval.status) }}
    </span>
  </div>

  <!-- Meta info -->
  <div class="card-meta">
    <div class="meta-item">
      <mat-icon class="meta-icon">calendar_today</mat-icon>
      <span>{{ formatDate(approval.decisionDate) }}</span>
    </div>
  </div>

  <!-- Actions -->
  <div class="card-actions" [ngClass]=" loading ? 'action-disabled' : '' ">
    <button class="btn btn--approve" (click)="approve()">
      <mat-icon>check_circle</mat-icon>
      Approve
    </button>
    <button class="btn btn--reject" (click)="reject()">
      <mat-icon>cancel</mat-icon>
      Reject
    </button>
    <button class="btn btn--preview" (click)="preview()">
      <mat-icon>visibility</mat-icon>
      Preview
    </button>
  </div>
</div>
