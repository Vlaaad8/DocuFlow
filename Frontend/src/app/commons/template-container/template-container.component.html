<div class="template-container">
  <div class="template-header">
    <mat-icon>article</mat-icon>
    <div class="first-row">
      <h3>{{ template.name }}</h3>
      <p class="confidence valid">{{template.status}}</p>
    </div>
    <div></div>
  </div>
  <div class="second-row">
    <p>Fields:</p>
    <p class="fields">{{ template.fields.length }} fields</p>
  </div>
  <div class="third-row">
    <p>Dynamic Fields:</p>
    <div class="field-list">
      <span *ngFor="let field of template.fields" class="field-design">{{ field.fieldName }}</span>
    </div>
  </div>

</div>
