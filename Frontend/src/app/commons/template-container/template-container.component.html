<div class="card">
  <!-- Top accent bar -->
  <div class="accent-bar"></div>

  <!-- Header -->
  <div class="card-header">
    <div class="card-left">
      <div class="card-icon">
        <mat-icon>document_scanner</mat-icon>
      </div>
      <div class="card-title">
        <h3>{{ template.name }}</h3>
        <span class="fields-chip">
          <mat-icon class="chip-icon">list_alt</mat-icon>
          {{ template.fields.length }} fields
        </span>
      </div>
    </div>
    <span class="status-badge">{{ template.category }}</span>
  </div>

  <!-- Dynamic fields -->
  <div class="card-fields">
    <p class="fields-label">Dynamic Fields</p>
    <div class="field-list">
      <span *ngFor="let field of template.fields" class="field-tag">{{ field.fieldName }}</span>
    </div>
  </div>
  <div class="card-fields">
    <p class="fields-label">Approval Chain</p>
    <div class="steps-row">
      <div class="step-item" *ngFor="let step of approvalChain.steps; let i = index">
        <div class="step-badge" [title]="step.approverRole" [class]="step.approverRole">
          {{ getRoleAbbreviation(step.approverRole) }}
        </div>
        <span class="step-role">{{ step.approverRole }}</span>
        <div class="step-connector" *ngIf="i < approvalChain.steps.length - 1">
          <mat-icon>arrow_forward</mat-icon>
        </div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="card-actions">
    <button class="btn btn--view" (click)="handleClick('Search')">
      <mat-icon>search</mat-icon>
      Preview
    </button>
    <button class="btn btn--edit" (click)="handleClick('Edit')">
      <mat-icon>edit</mat-icon>
      Edit
    </button>
    <button class="btn btn--delete" (click)="handleClick('Delete')">
      <mat-icon>delete</mat-icon>
      Remove
    </button>
  </div>

</div>
