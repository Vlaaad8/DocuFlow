<div class="preview-input">
  <div class="label-section">
    <label for="documentPreview">{{fieldName}}</label>
  </div>
  <div class="results">
    <input type="text" placeholder="No value extracted yet" [value]="extractedValue"
      [ngClass]="getInputConfidenceClass()">
    <span class="confidence" [ngClass]="getConfidenceClass()">{{confidenceScore}}%</span>
  </div>
</div>
