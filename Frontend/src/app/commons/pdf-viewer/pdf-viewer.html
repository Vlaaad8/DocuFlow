<div class="pdf-container">
  <div class="pdf-overlay" (click)="handleClose()"></div>
  <div class="pdf-modal">
    <button class="exitButton" (click)="handleClose()"><mat-icon>close</mat-icon></button>

    <div class="pdf-content">
      <pdf-viewer
        [src]="pdfUrl"
        [render-text]="true"
        [original-size]="false"
        style="width: 100%; height: 80vh; display: block;">
      </pdf-viewer>
    </div>
  </div>
</div>
