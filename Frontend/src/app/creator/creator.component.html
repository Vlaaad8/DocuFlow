<mat-sidenav-container>
  <mat-sidenav mode="side" opened class="sidenav-design">
    <app-sidenav-user [selectemTemplteCreator]="true"></app-sidenav-user>


  </mat-sidenav>

  <mat-sidenav-content>
    <div class="description-section">
      <div class="first-row">
        <h2>Template Creator</h2>
        <app-exit-button></app-exit-button>
      </div>
      <p>Create and customize your document templates here.</p>
    </div>

    <app-loading *ngIf="!showEditor()" title="Loading editor..." message="Please wait while we finish loading"></app-loading>
    <div class="error-section" *ngIf="errorMessage">
      <mat-icon>error</mat-icon>
      <div class="action-zone">
        <p>{{errorMessage}}</p>
        <mat-icon (click)="errorMessage = null">close</mat-icon>
      </div>
    </div>
    <div class="editor" [style.visibility]="showEditor() ? 'visible' : 'hidden'">
      <editor [apiKey]="tinymceApiKey" [init]="tinyInit" [(ngModel)]="content" id="editor" />
      <div class="edit-section">
        <h3>Creator Panel</h3>
        <div class="info-section">
          <div class="icon-title">
            <mat-icon>touch_app</mat-icon>
            <h4>Actions</h4>
          </div>
          <p>Take different actions regarding editing</p>
        </div>
        <div class="button-section">
          <button type="button" class="btn" (click)="handleEdit()">Save</button>
          <button type="button" class="btn" (click)="handleClear()">Preview</button>
          <button type="button" class="btn" (click)="handleClear()">Clear</button>
        </div>
        <div class="info-section">
          <div class="icon-title"><mat-icon>design_services</mat-icon>
            <h4>Fields</h4>
          </div>
          <p>Drag and drop fields to customize your template</p>
        </div>
        <div class="label-container">
          <app-label-display *ngFor="let field of fields" [field]="field" (dragStarted)="handleDrag($event)"></app-label-display>
        </div>
      </div>
    </div>

  </mat-sidenav-content>
</mat-sidenav-container>

      <ng-template #templateDetails>
        <div class="upload-card">
          <div class="card-header">
            <h3>Template Details</h3>
            <mat-icon (click)="closeDialog()" class="close-button">close</mat-icon>
          </div>
          <div class="form-zone">
            <form [formGroup]="formGroup" (ngSubmit)="handleSave()">
              <div class="input-design">
                <label>Template Name</label>
                <input type="text" formControlName="name" />
              </div>
              <div class="input-design">
                <label>Description</label>
                <textarea formControlName="description"></textarea>
              </div>
              <div class="input-design">
                <label>Category</label>
                <select formControlName="category">
                  <option *ngFor="let category of templateCategories" [value]="category">{{category}}</option>
                </select>
              </div>
              <div class="input-design">
                <label>Approval Flow</label>
                <select formControlName="approvalFlow">
                  <option *ngFor="let flow of approvalFlows" [value]="flow.id">{{flow.name}}</option>
                </select>
              </div>
              <div class="buttonSection">
                <button type="submit">Add Template</button>
                <button type="button" (click)="closeDialog()">Cancel</button>
              </div>
            </form>
          </div>
        </div>
      </ng-template>
